name: Deploy Dev to Azure Static Web Apps

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web export for Azure (root path)
        run: |
          # Temporarily use Azure-specific config without baseUrl for root deployment
          mv app.config.js app.config.js.backup
          cp app.azure.json app.json
          npx expo export --platform web --output-dir dist --clear
          rm app.json
          mv app.config.js.backup app.config.js

      - name: Build PWA assets
        run: node scripts/prepare-pwa.js

      - name: Copy docs to dist
        run: cp -R docs dist/docs

      - name: Copy Azure config to dist
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: List dist contents
        run: |
          echo "Dist contents:"
          ls -la dist/
          echo "Docs contents:"
          ls -la dist/docs/

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_GAMES_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/dist"
          output_location: ""
          skip_app_build: true
