<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FFFEF7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Gentle Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Gentle Games — Calm, Sensory-Friendly Games for Kids</title>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Gentle Games — Calm, Sensory-Friendly Games for Kids" />
    <meta property="og:description" content="Free, open-source mobile games designed for children with sensory sensitivities. No ads, no paywalls, just calm fun. Features Memory Snap, Drawing Pad, Glitter Fall, Bubble Pop, Category Match, and Keepy Uppy." />
    <meta property="og:image" content="https://games.gentlegames.org/assets/pwa/image.png" />
    <meta property="og:url" content="https://games.gentlegames.org" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gentle Games" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gentle Games — Calm, Sensory-Friendly Games for Kids" />
    <meta name="twitter:description" content="Free, open-source mobile games designed for children with sensory sensitivities. No ads, no paywalls, just calm fun." />
    <meta name="twitter:image" content="https://games.gentlegames.org/assets/pwa/image.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        margin: 0;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        background: #FFFEF7;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      #root,
      #root * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #root a,
      #root button,
      #root [role='button'] {
        touch-action: manipulation;
      }
      #root img,
      #root svg,
      #root canvas {
        -webkit-user-drag: none;
        user-drag: none;
      }
      #root input,
      #root textarea,
      #root select,
      #root [contenteditable='true'] {
        -webkit-touch-callout: default;
        -webkit-user-select: text;
        user-select: text;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
